name: Bug Report
description: Report something that is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. It is automatically formatted, no backticks needed.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which version or commit are you running?
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: false
